

server:
  port: ${PORT:10000}
  address: 0.0.0.0
  tomcat:
    # 1. Chỉ cho phép tối đa 200 request được xử lý cùng lúc (mặc định 8192 rất dễ sập RAM)
    max-connections: 200
    # 2. Số thread tối đa được tạo ra (giữ ở mức 50 để đỡ tốn CPU của Render)
    threads:
      max: 50
    # 3. Khi server bận, cho tối đa 100 request đứng xếp hàng (sau đó drop ngay lập tức)
    accept-count: 100
management:
  endpoints:
    web:
      exposure:
        include: health,info
spring:
  datasource:
    driver-class-name: org.postgresql.Driver
    url: ${DB_URL} #neu deloy spring boot len docker thi se dung url jdbc:postgresql://postgres:5432/web_ban_hang
    username: ${DB_USERNAME_POSTGRES}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 100
      minimum-idle: 20
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      leak-detection-threshold: 60000
  profiles:
    active: dev
  ai:
    openai:
      api-key: ${OPENROUTER_API_KEY}
      base-url: ${OPENROUTER_BASE_URL}
      chat:
        options:
          model: ${OPENROUTER_CHAT_MODEL}
          temperature: ${OPENROUTER_CHAT_TEMPERATURE}
          max_tokens: ${OPENROUTER_CHAT_MAX_TOKENS}
  jpa:
    open-in-view: false
    show-sql: false
    properties:
      hibernate:
        jdbc:
          batch_size: 50
          fetch_size: 100
        order_inserts: true
        order_updates: true
        query:
          plan_cache_max_size: 2048
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_batch_fetch_size: 100
  #  #    redis
  #  data:
  #    redis:
  #      host: localhost
  #      port: 6379
  data:
    redis:
      #          url: ${REDIS_URL}
      #      username: ${REDIS_USERNAME}
      password: ${REDIS_PASSWORD}
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      timeout: 3000ms
  websocket:
    stomp:
      heartbeat:
        server: 15000
        client: 10000
  threads:
    virtual:
      enabled: false
#rsa:
#  public-key: ${RSA_PUBLIC_KEY}
#  private-key: ${RSA_PRIVATE_KEY}
jwt:
  access-token-expiration: ${JWT_ACCESS_EXPIRATION}
  refresh-token-expiration: ${JWT_REFRESH_EXPIRATION}

rsa:
  public-key: ${RSA_PUBLIC_KEY}
  private-key: ${RSA_PRIVATE_KEY}
hash:
  argon2:
    memory: 15360
    iterations: 2
    length: 32
    parallelism: 1
    type: id
    version: 19
imagekit:
  public-key: ${IMAGEKIT_PUBLIC_KEY}
  private-key: ${IMAGEKIT_PRIVATE_KEY}
  url-endpoint: ${IMAGEKIT_URL_ENDPOINT}

app:
  google:
    client-id: ${GOOGLE_CLIENT_ID}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS}

appbe:
  connecthuburl: ${CONNECT_HUB_URL}