server:
  port: 8808
  address: 0.0.0.0

spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME_POSTGRES}
    password: ${DB_PASSWORD}

  data:
    redis:
      #          url: ${REDIS_URL}
#      username: ${REDIS_USERNAME}
      password: ${REDIS_PASSWORD}
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      timeout: 3000ms

  ai:
    openai:
      api-key: ${OPENROUTER_API_KEY}
      base-url: ${OPENROUTER_BASE_URL}

logging:
  level:
    root: INFO
appbe:
  connecthuburl: ${CONNECT_HUB_URL}
app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS}